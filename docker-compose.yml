version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chatapp_postgres
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - chatapp_pgdata:/var/lib/postgresql/data

volumes:
  chatapp_pgdata: